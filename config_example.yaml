# Global media scraping whitelist
# Link scraping for images/GIFs will only be performed on domains listed below.
# If this list is empty or omitted, link scraping is disabled entirely.
media_whitelist:
  - "tenor.com"
  - "giphy.com"
  - "imgur.com"
  - "klipy.com"

# GIF API Providers (optional - fallback to scraping if not configured)
# Get API keys from:
#   Tenor: Google Cloud Console -> Enable Tenor API -> Create API key
#   Giphy: https://developers.giphy.com/dashboard/ -> Create App -> API Key
#   Klipy: https://docs.klipy.com/ -> Create API key (compatible with Tenor API)
#   Imgur: https://api.imgur.com/ -> Register application -> Client ID
gif_providers:
  tenor_api_key: ""  # Optional: "YOUR_TENOR_API_KEY"
  giphy_api_key: ""  # Optional: "YOUR_GIPHY_API_KEY"
  klipy_api_key: ""  # Optional: "YOUR_KLIPY_API_KEY"
  imgur_client_id: ""  # Optional: "YOUR_IMGUR_CLIENT_ID"

# services have a name, and their connection settings
# you may have multiple services of the same protocol
services:
  matrix_bot:
    protocol: matrix
    homeserver_url: "https://matrix.org"
    username: "user"
    password: "pass"
    debug: false

  whatsapp:
    protocol: whatsapp
    # Path to store the session data.
    # For Docker, use "data/whatsapp_session" to ensure it persists via the mounted volume.
    session_path: "data/whatsapp_session"
    debug: false

  discord_direct:
    protocol: discord
    bot_token: "your_discord_bot_token_here"
    debug: false

# bridges are connections between channels/rooms
# you can link between as many services and channels as you like
# aliases will override user names
bridges:
  family_bridge:
    - service: matrix_bot
      channel: "!room:matrix.org"
      display_names: true
      # Whether to bridge messages sent by this account in this room (default: false)
      # Usually false for bots, but may be true if using a personal account
      bridge_own_messages: false
      enable_media: true
      aliases:
        "@user:matrix.org": "Bob"
    - service: whatsapp
      channel: "00000@lid"
      display_names: true
      enable_media: true
      # Example: bridge your own messages sent from your phone
      bridge_own_messages: true
      aliases:
        "1234567890@s.whatsapp.net": "Alice"
        "00000@lid": "MySelf"

  rpg_bridge:
    - service: matrix_bot
      channel: "!room:matrix.org"
      display_names: true
      enable_media: true
      bridge_own_messages: false
    - service: discord_direct
      channel: "1234567890" # Discord channel ID (right-click channel -> Copy ID)
      display_names: true
      bridge_own_messages: false
      enable_media: false # Example: Disable media sending to Discord (text only)
